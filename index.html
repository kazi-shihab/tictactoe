<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <title>Tic Tac Toe</title>
</head>
<body>

  <div class="container">
    <h1>TIC TAC TOE</h1>
    <hr>
    
    <div class="player-description">
      <h2>Player 1 is O</h2>
      <h2>Player 2 is X</h2>
    </div>
    
    <div class="grid-container">
      <div class="grid">
        <div class="row">
          <button id="1" class="col"></button>
          <button id="2" class="col"></button>
          <button id="3" class="col"></button>
        </div>
        <div class="row">
          <button id="4" class="col"></button>
          <button id="5" class="col"></button>
          <button id="6" class="col"></button>
        </div>
        <div class="row">
          <button id="7" class="col"></button>
          <button id="8" class="col"></button>
          <button id="9" class="col"></button>
        </div>
      </div>
    </div>
    
    <h2 class="winner-display"></h2>
    
    <div class="restart-btn-div">
      <button class="restart-btn">Restart Game</button>
    </div>
  </div>

  <script src="index.js"></script>
</body>
</html>
